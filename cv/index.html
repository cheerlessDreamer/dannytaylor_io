<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV — Danny Taylor</title>
    <meta name="robots" content="noindex">
    <meta http-equiv="refresh" content="1; url=/assets/other/DannyTaylorWebCV.pdf">
    <link rel="canonical" href="https://dannytaylor.io/cv">
    <link rel="icon" href="/favicon.ico">
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-weight: 200;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            box-sizing: border-box;
        }
        .cv-redirect {
            max-width: 32rem;
        }
        .cv-redirect h1 {
            font-size: 1.5rem;
            font-weight: 300;
            margin: 0 0 0.5rem;
        }
        .cv-redirect p {

            line-height: 1.6;
            opacity: 0.7;
            margin: 0 0 1.5rem;
        }
        .cv-redirect a {
            color: inherit;
            text-decoration: underline;
            text-underline-offset: 0.3em;
        }

<body>
    <div class="cv-redirect">
        <h1>Opening CV&hellip;</h1>
        <p>If your browser doesn't redirect automatically, <a href="/assets/other/DannyTaylorWebCV.pdf">download the CV here</a>.</p>
    </div>
    <script>
        // Belt and braces: trigger the redirect after a beat, in case
        // meta refresh is suppressed (some browsers block it on user-script pages).
        setTimeout(function () {
            window.location.replace('/assets/other/DannyTaylorWebCV.pdf');
        }, 1100);
    </script>
    <!-- 100% privacy-first analytics -->
    <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
