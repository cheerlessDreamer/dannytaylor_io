<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV — Danny Taylor</title>
    <meta name="robots" content="noindex">
    <link rel="canonical" href="https://dannytaylor.io/cv">
    <link rel="icon" href="/favicon.ico">
    <!-- SimpleAnalytics event-queue stub (must come before any sa_event calls) -->
    <script>window.sa_event=window.sa_event||function(){var a=[].slice.call(arguments);window.sa_event.q?window.sa_event.q.push(a):window.sa_event.q=[a]};</script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-weight: 200;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            box-sizing: border-box;
        }
        .cv-redirect {
            max-width: 32rem;
        }
        .cv-redirect h1 {
            font-size: 1.5rem;
            font-weight: 300;
            margin: 0 0 0.5rem;
        }
        .cv-redirect p {
            font-size: 1rem;
            line-height: 1.6;
            opacity: 0.7;
            margin: 0 0 1.5rem;
        }
        .cv-redirect a {
            color: inherit;
            text-decoration: underline;
            text-underline-offset: 0.3em;
        }
    </style>
</head>

<body>
    <div class="cv-redirect">
        <h1>Opening CV&hellip;</h1>
        <p>If your browser doesn't redirect automatically, <a href="/assets/other/DannyTaylorWebCV.pdf">download the CV here</a>.</p>
    </div>
    <script>
        var pdfUrl = '/assets/other/DannyTaylorWebCV.pdf';
        var redirected = false;
        function redirect() {
            if (redirected) return;
            redirected = true;
            window.location.replace(pdfUrl);
        }
        // Hard cap — if SA never loads (blocker, offline, etc.), bounce anyway.
        setTimeout(redirect, 3000);

        // Fire the event once SA has loaded, then redirect from inside its callback
        // (per the SA docs' recommended pattern for navigation events).
        // DNT doesn't play nicely with callbacks — fall back to plain redirect.
        function trackAndRedirect() {
            var dntActive = parseInt(navigator.msDoNotTrack || window.doNotTrack || navigator.doNotTrack, 10) === 1;
            if (window.sa_loaded && !dntActive) {
                sa_event('cv_download', redirect);
            } else {
                redirect();
            }
        }
    </script>
    <!-- 100% privacy-first analytics -->
    <script
        async
        src="https://scripts.simpleanalyticscdn.com/latest.js"
        onload="trackAndRedirect()"
        onerror="redirect()"></script>
</body>

</html>
