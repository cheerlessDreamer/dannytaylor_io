<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV — Danny Taylor</title>
    <meta name="robots" content="noindex">
    <link rel="canonical" href="https://dannytaylor.io/cv">
    <link rel="icon" href="/favicon.ico">
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-weight: 200;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            box-sizing: border-box;
        }
        .cv-redirect {
            max-width: 32rem;
        }
        .cv-redirect h1 {
            font-size: 1.5rem;
            font-weight: 300;
            margin: 0 0 0.5rem;
        }
        .cv-redirect p {
            font-size: 1rem;
            line-height: 1.6;
            opacity: 0.7;
            margin: 0 0 1.5rem;
        }
        .cv-redirect a {
            color: inherit;
            text-decoration: underline;
            text-underline-offset: 0.3em;
        }
    </style>
</head>

<body>
    <div class="cv-redirect">
        <h1>Opening CV&hellip;</h1>
        <p>If your browser doesn't redirect automatically, <a href="/assets/other/DannyTaylorWebCV.pdf">download the CV here</a>.</p>
    </div>
    <script>
        // SimpleAnalytics event-queue stub — calls before the SA script loads
        // are queued, then flushed once it loads.
        window.sa_event = window.sa_event || function () {
            var a = [].slice.call(arguments);
            a.unshift('event');
            (sa_event.q = sa_event.q || []).push(a);
        };
        // Queue the CV download event immediately.
        sa_event('cv_download');

        var pdfUrl = '/assets/other/DannyTaylorWebCV.pdf';
        var redirected = false;
        function redirect() {
            if (redirected) return;
            redirected = true;
            window.location.replace(pdfUrl);
        }
        // Hard cap — if SA never loads (offline, blocker, etc.), bounce anyway after 3s.
        setTimeout(redirect, 3000);
    </script>
    <!-- 100% privacy-first analytics -->
    <script
        async
        src="https://scripts.simpleanalyticscdn.com/latest.js"
        onload="setTimeout(redirect, 200);"
        onerror="redirect();"></script>
</body>

</html>
